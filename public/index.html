<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener | Fast & Secure</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-link"></i>
                <h1><span class="gradient-text">Short</span>.ly</h1>
            </div>
            <p>Paste your long URL here and get a clean, shareable link.</p>
        </header>

        <div class="main-card glass-panel">
            <form id="url-form">
                <div class="input-group">
                    <i class="fa-solid fa-globe input-icon"></i>
                    <input type="url" id="long-url" placeholder="https://your-long-url-goes-here.com" required>
                    <button type="submit" id="submit-btn" class="glow-btn">
                        <span>Shorten</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </form>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Generating your link...</p>
            </div>

            <div id="result" class="result-area hidden">
                <div class="success-icon">
                    <i class="fa-solid fa-check-circle"></i>
                </div>
                <h3>Your link is ready!</h3>
                <div class="short-url-box">
                    <a href="#" id="short-url-link" target="_blank"></a>
                    <button id="copy-btn" title="Copy to clipboard">
                        <i class="fa-regular fa-copy"></i>
                    </button>
                </div>
                <div class="stats hidden">
                    <span class="stat-badge"><i class="fa-solid fa-chart-bar"></i> <span id="click-count">0</span> clicks</span>
                </div>
                <button id="new-btn" class="text-btn">Shorten another URL</button>
            </div>

            <div id="error-message" class="error-msg hidden">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="error-text">An error occurred. Please try again.</span>
            </div>
        </div>
        
        <footer>
            <p>Made with <i class="fa-solid fa-heart"></i> for the modern web | <a href="#" id="github-link"><i class="fa-brands fa-github"></i> View Source</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
